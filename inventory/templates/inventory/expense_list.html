{% extends 'inventory/base.html' %}
{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Expenses List</h2>
  <a href="{% url 'expense_add' %}" class="btn btn-success mb-3">Add New Expense</a>
  <table class="table table-bordered table-hover table-striped">
    <thead class="table-dark">
      <tr>
        <th>Date</th>
        <th>Reason</th>
        <th>Amount</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for expense in expenses %}
      <tr>
        <td>{{ expense.date }}</td>
        <td>{{ expense.reason }}</td>
        <td>৳{{ expense.amount }}</td>
        <td>
          <a href="{% url 'expense_edit' expense.id %}" class="btn btn-primary btn-sm">Edit</a>
          <a href="{% url 'expense_delete' expense.id %}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
