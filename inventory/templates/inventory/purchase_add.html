{% extends 'inventory/base.html' %}
{% block content %}
<div class="container mt-5">
  <h2 class="mb-4 text-center">Add Purchase</h2>

  <form method="POST">
    {% csrf_token %}
    
    <!-- Product Section -->
    <div id="product-section">
      <div class="product-row mb-3">
        <div class="row">
          <div class="col-md-4">
            <label for="product">Product</label>
            <select name="product" class="form-control" required>
              {% for p in products %}
                <option value="{{ p.id }}">{{ p.name }} ({{ p.part_number }})</option>
              {% endfor %}
            </select>
          </div>
          
          <div class="col-md-2">
            <label for="rate">Rate</label>
            <input type="number" name="rate" class="form-control" placeholder="Rate" required>
          </div>

          <div class="col-md-2">
            <label for="cost">Cost</label>
            <input type="number" name="cost" class="form-control" placeholder="Cost" required>
          </div>

          <div class="col-md-2">
            <label for="quantity">Quantity</label>
            <input type="number" name="quantity" class="form-control" placeholder="Quantity" required>
          </div>

          <div class="col-md-2">
            <label for="remark" class="form-label">Remark</label>
            <input type="text" name="remark" class="form-control" placeholder="Remark">
          </div>

          <div class="col-md-2 d-flex align-items-end">
            <button type="button" class="btn btn-danger remove-btn" onclick="removeRow(this)">Remove</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Another Product Button -->
    <div class="text-center">
      <button type="button" class="btn btn-secondary" onclick="addRow()">Add Another Product</button>
    </div>

    <!-- Submit Button -->
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary">Submit Purchase</button>
    </div>
  </form>
</div>

<script>
// Function to search products dynamically
function searchProducts() {
  const query = document.getElementById('product-search').value;

  if (query.length >= 3) { // Start searching if the query is at least 3 characters long
    fetch(`/search/products/?q=${query}`)
      .then(response => response.json())
      .then(data => {
        const productSelect = document.getElementById('product-select');
        productSelect.innerHTML = ''; // Clear previous results

        data.products.forEach(product => {
          const option = document.createElement('option');
          option.value = product.id;
          option.textContent = `${product.name} (Available: ${product.quantity})`;
          productSelect.appendChild(option);
        });
      })
      .catch(error => console.error('Error fetching products:', error));
  }
}

// Function to add another product row
function addRow() {
  const section = document.getElementById('product-section');
  const row = section.querySelector('.product-row').cloneNode(true);

  // Clear input values in the new row
  const inputs = row.querySelectorAll('input');
  inputs.forEach(input => input.value = '');
  row.querySelector('#product-search').value = ''; // Clear search input
  section.appendChild(row);
}

// Function to remove a product row
function removeRow(button) {
  const section = document.getElementById('product-section');
  if (section.querySelectorAll('.product-row').length > 1) {
    button.parentElement.parentElement.remove();
  } else {
    alert("At least one product row must remain.");
  }
}
</script>

{% block extra_css %}
<style>
  /* Custom Styling for the page */
  .container {
    max-width: 800px;
  }

  h2 {
    font-size: 32px;
    color: #333;
  }

  .card {
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }

  .form-label {
    font-size: 14px;
  }

  .form-control {
    font-size: 16px;
    padding: 10px;
  }

  .btn {
    font-size: 16px;
    padding: 10px 20px;
  }

  .remove-btn {
    font-size: 14px;
    padding: 6px 10px;
    text-align: center;
    background-color: #e74c3c;
    border: none;
    color: white;
    cursor: pointer;
  }

  .remove-btn:hover {
    background-color: #c0392b;
  }

  /* Search input styling */
  .input-group-text {
    cursor: pointer;
  }
</style>
{% endblock %}
{% endblock %}
